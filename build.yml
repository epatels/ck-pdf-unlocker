name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pikepdf pyinstaller packaging posthog pillow

      - name: Install NSIS
        run: choco install nsis --yes
        shell: cmd

      - name: Build exe + installer
        run: python build_installer.py
        shell: cmd

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "CK PDF Unlocker ${{ github.ref_name }}"
          body: |
            ## CK PDF Unlocker ${{ github.ref_name }}

            ### Download
            Click **ck-pdf-unlocker-setup.exe** below to install.

            ### What's new
            _(update release notes here after publishing)_
          draft: false
          prerelease: false
          files: |
            dist/ck-pdf-unlocker-setup.exe
